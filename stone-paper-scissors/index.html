<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Stone Paper Scissors</h1>
    <div class="choices">
        <div class="choice">
            <img src="images/stone.png" alt="Stone" id="stone">
        </div>
        <div class="choice">
            <img src="images/paper.png" alt="Paper" id="paper">
        </div>
        <div class="choice">
            <img src="images/scissors.png" alt="Scissors" id="scissors">
        </div>
    </div>
    <div class="scoreboard">
        <div class="score">
            <p id="user-score">0</p>
            <p>User</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="message-container">
        <p id="message">Make your move!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
